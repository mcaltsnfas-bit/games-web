<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240">
  <defs>
    <pattern id="grid" width="22" height="22" patternUnits="userSpaceOnUse">
      <path d="M 22 0 L 0 0 0 22" fill="none" stroke="#1c2636" stroke-width="1"/>
    </pattern>
    <radialGradient id="glow1" cx="35%" cy="65%" r="30%">
      <stop offset="0%" stop-color="#2dd4f0" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#2dd4f0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="65%" cy="35%" r="30%">
      <stop offset="0%" stop-color="#ff3d7f" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ff3d7f" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="400" height="240" fill="#060809"/>
  <rect width="400" height="240" fill="url(#grid)"/>
  <rect width="400" height="240" fill="url(#glow1)"/>
  <rect width="400" height="240" fill="url(#glow2)"/>

  <!-- arena ring -->
  <ellipse cx="200" cy="120" rx="170" ry="100" fill="none" stroke="#2dd4f0" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.5"/>

  <!-- cyan car (bottom-left) -->
  <g transform="translate(120,150) rotate(-35)">
    <rect x="-18" y="-8" width="36" height="16" rx="3" fill="#2dd4f0"/>
    <rect x="-10" y="-12" width="18" height="8" rx="2" fill="#2dd4f0" opacity="0.7"/>
    <rect x="14" y="-4" width="8" height="8" rx="1" fill="white" opacity="0.8"/>
    <rect x="-22" y="-6" width="6" height="5" rx="2" fill="#111"/>
    <rect x="-22" y="1" width="6" height="5" rx="2" fill="#111"/>
    <rect x="16" y="-6" width="6" height="5" rx="2" fill="#111"/>
    <rect x="16" y="1" width="6" height="5" rx="2" fill="#111"/>
  </g>
  <ellipse cx="120" cy="150" rx="28" ry="14" fill="#2dd4f0" opacity="0.12"/>

  <!-- magenta car (top-right) -->
  <g transform="translate(280,90) rotate(145)">
    <rect x="-18" y="-8" width="36" height="16" rx="3" fill="#ff3d7f"/>
    <rect x="-10" y="-12" width="18" height="8" rx="2" fill="#ff3d7f" opacity="0.7"/>
    <rect x="14" y="-4" width="8" height="8" rx="1" fill="white" opacity="0.8"/>
    <rect x="-22" y="-6" width="6" height="5" rx="2" fill="#111"/>
    <rect x="-22" y="1" width="6" height="5" rx="2" fill="#111"/>
    <rect x="16" y="-6" width="6" height="5" rx="2" fill="#111"/>
    <rect x="16" y="1" width="6" height="5" rx="2" fill="#111"/>
  </g>
  <ellipse cx="280" cy="90" rx="28" ry="14" fill="#ff3d7f" opacity="0.12"/>

  <!-- projectile trail -->
  <line x1="148" y1="138" x2="258" y2="102" stroke="#2dd4f0" stroke-width="2" opacity="0.4" stroke-dasharray="5 4"/>
  <circle cx="258" cy="102" r="4" fill="#2dd4f0" opacity="0.9"/>
  <circle cx="258" cy="102" r="8" fill="#2dd4f0" opacity="0.2"/>

  <!-- VS label -->
  <text x="200" y="128" font-family="monospace" font-size="13" font-weight="700" fill="white" opacity="0.55" text-anchor="middle">VS</text>
</svg>
