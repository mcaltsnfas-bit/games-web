<!DOCTYPE html>
<html>
<head>
<title>Tic Tac Toe</title>
<style>
body {
  font-family:Arial;
  text-align:center;
  background:#111;
  color:white;
}

.grid {
  display:grid;
  grid-template-columns:repeat(3,100px);
  justify-content:center;
  margin-top:40px;
}

.cell {
  width:100px;
  height:100px;
  border:1px solid white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
  cursor:pointer;
}

button { margin-top:20px; padding:10px; }
</style>
</head>
<body>

<h2>Tic Tac Toe (vs AI)</h2>

<div class="grid" id="grid"></div>
<button onclick="reset()">Restart</button>

<script>
let board = [];
let gameOver = false;
let aiThinking = false;

const grid = document.getElementById("grid");

function reset(){
  board = Array(9).fill("");
  gameOver = false;
  aiThinking = false;
  render();
}

function checkWin(b){
  const win = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];

  return win.some(c =>
    b[c[0]] &&
    b[c[0]] === b[c[1]] &&
    b[c[1]] === b[c[2]]
  );
}

function aiMove(){
  if(gameOver) return;

  let empty = board
    .map((v,i)=>v===""?i:null)
    .filter(v=>v!==null);

  if(empty.length === 0) return;

  let move = empty[Math.floor(Math.random()*empty.length)];
  board[move] = "O";

  if(checkWin(board)){
    gameOver = true;
    setTimeout(()=>alert("Computer wins!"),100);
  }

  aiThinking = false;
  render();
}

function click(i){
  if(board[i] || gameOver || aiThinking) return;

  board[i] = "X";

  if(checkWin(board)){
    gameOver = true;
    render();
    setTimeout(()=>alert("You win!"),100);
    return;
  }

  aiThinking = true;
  render();

  setTimeout(aiMove, 300);
}

function render(){
  grid.innerHTML = "";

  board.forEach((v,i)=>{
    const d = document.createElement("div");
    d.className = "cell";
    d.innerText = v;
    d.onclick = () => click(i);
    grid.appendChild(d);
  });
}

reset();
</script>

</body>
</html>
