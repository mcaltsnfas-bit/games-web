<!DOCTYPE html>
<html>
<head>
<title>Tic Tac Toe</title>
<style>
body { font-family: Arial; text-align:center; background:#111; color:white; }
.grid { display:grid; grid-template-columns:repeat(3,100px); justify-content:center; margin-top:50px; }
.cell { width:100px; height:100px; font-size:40px; display:flex; justify-content:center; align-items:center; border:1px solid white; cursor:pointer; }
</style>
</head>
<body>

<h1>Tic Tac Toe</h1>
<div class="grid" id="grid"></div>

<script>
let current="X";
let cells=[];

const grid=document.getElementById("grid");

for(let i=0;i<9;i++){
  const cell=document.createElement("div");
  cell.className="cell";
  cell.onclick=()=> {
    if(cell.innerText===""){
      cell.innerText=current;
      current=current==="X"?"O":"X";
    }
  };
  grid.appendChild(cell);
  cells.push(cell);
}
</script>

</body>
</html>
