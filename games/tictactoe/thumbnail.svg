<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240">
  <defs>
    <pattern id="dots" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="#ffffff" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="400" height="240" fill="#0a0d14"/>
  <rect width="400" height="240" fill="url(#dots)"/>

  <!-- grid -->
  <g stroke="#3a4356" stroke-width="3">
    <line x1="150" y1="40" x2="150" y2="200"/>
    <line x1="222" y1="40" x2="222" y2="200"/>
    <line x1="80" y1="100" x2="320" y2="100"/>
    <line x1="80" y1="160" x2="320" y2="160"/>
  </g>

  <!-- winning row glow -->
  <line x1="80" y1="70" x2="320" y2="70" stroke="#ffce45" stroke-width="3" opacity="0.35"/>

  <!-- X marks -->
  <g stroke="#2dd4f0" stroke-width="7" stroke-linecap="round">
    <line x1="98" y1="52" x2="132" y2="88"/>
    <line x1="132" y1="52" x2="98" y2="88"/>
    <line x1="242" y1="172" x2="276" y2="208"/>
    <line x1="276" y1="172" x2="242" y2="208"/>
  </g>

  <!-- O marks -->
  <g stroke="#ff3d7f" stroke-width="7" fill="none">
    <circle cx="186" cy="70" r="20"/>
    <circle cx="186" cy="130" r="20"/>
  </g>
</svg>
