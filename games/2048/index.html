<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>%F0%9F%95%B9%EF%B8%8F</text></svg>">
<title>2048 — Web Arcade</title>
<link rel="stylesheet" href="../../style.css">
<style>
  #board2048 {
    display: grid;
    grid-template-columns: repeat(4, 72px);
    grid-template-rows: repeat(4, 72px);
    gap: 8px;
  }
  .tile2048 {
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 8px;
    font-family: var(--font-mono);
    font-weight: 700;
    background: var(--bg-recess);
  }
</style>
</head>
<body>

<div class="game-topbar">
  <a class="game-topbar__back" href="../../index.html">&larr; Arcade</a>
  <span class="game-topbar__brand">WEB ARCADE</span>
</div>

<main class="game-shell">
  <h2>2048</h2>
  <p class="game-shell__hint">Arrow keys, WASD, or swipe. Combine matching tiles until you hit 2048.</p>

  <div class="scoreboard">
    <div class="scoreboard__item">Score<b id="score">0</b></div>
    <div class="scoreboard__item">Best<b id="best">0</b></div>
  </div>

  <div class="game-stage">
    <div id="board2048"></div>

    <div class="game-overlay" id="winOverlay">
      <div class="game-overlay__title">2048!</div>
      <div class="game-overlay__detail">You hit the target tile — keep going for a higher score.</div>
      <div class="game-controls">
        <button class="btn btn--solid" id="keepGoing">Keep going</button>
        <button class="btn" id="newGameFromWin">New game</button>
      </div>
    </div>

    <div class="game-overlay" id="overOverlay">
      <div class="game-overlay__title">Game over</div>
      <div class="game-overlay__detail" id="overDetail">Score: 0</div>
      <button class="btn btn--solid" id="restart">Play again</button>
    </div>
  </div>

  <div class="game-controls">
    <button class="btn" id="restartTop">New game</button>
  </div>
</main>

<script>
const boardEl = document.getElementById('board2048');
const scoreEl = document.getElementById('score');
const bestEl = document.getElementById('best');
const winOverlay = document.getElementById('winOverlay');
const overOverlay = document.getElementById('overOverlay');
const overDetail = document.getElementById('overDetail');

const BEST_KEY = 'arcade.2048.best';
function getBest(){ try { return parseInt(localStorage.getItem(BEST_KEY) || '0', 10); } catch(e){ return 0; } }
function setBest(v){ try { localStorage.setItem(BEST_KEY, String(v)); } catch(e){} }
bestEl.textContent = getBest();

const TILE_COLORS = {
  2: '#16202b', 4: '#1b2a3a', 8: '#123b4a', 16: '#0f4f63',
  32: '#0f6b85', 64: '#15879f', 128: '#1ea7c0', 256: '#2dd4f0',
  512: '#c34fae', 1024: '#ff3d7f', 2048: '#ffce45', 4096: '#fff4c2'
};

let board, score, hasWon, gameOver;

function emptyBoard(){ return Array.from({ length: 4 }, () => Array(4).fill(0)); }

function emptyCells(b){
  const cells = [];
  for (let r = 0; r < 4; r++) for (let c = 0; c < 4; c++) if (b[r][c] === 0) cells.push([r, c]);
  return cells;
}

function spawnTile(b){
  const cells = emptyCells(b);
  if (cells.length === 0) return;
  const [r, c] = cells[Math.floor(Math.random() * cells.length)];
  b[r][c] = Math.random() < 0.9 ? 2 : 4;
}

function transpose(b){ return b[0].map((_, c) => b.map((row) => row[c])); }
function reverseRows(b){ return b.map((row) => row.slice().reverse()); }

function compressMergeRow(row){
  const filtered = row.filter((v) => v !== 0);
  const merged = [];
  let gained = 0;
  for (let i = 0; i < filtered.length; i++) {
    if (filtered[i] === filtered[i + 1]) {
      merged.push(filtered[i] * 2);
      gained += filtered[i] * 2;
      i++;
    } else {
      merged.push(filtered[i]);
    }
  }
  while (merged.length < 4) merged.push(0);
  return { row: merged, gained };
}

function moveLeft(b){
  let moved = false, gained = 0;
  const newBoard = b.map((row) => {
    const result = compressMergeRow(row);
    gained += result.gained;
    if (result.row.some((v, i) => v !== row[i])) moved = true;
    return result.row;
  });
  return { board: newBoard, moved, gained };
}

function moveRight(b){
  const r = moveLeft(reverseRows(b));
  return { board: reverseRows(r.board), moved: r.moved, gained: r.gained };
}

function moveUp(b){
  const r = moveLeft(transpose(b));
  return { board: transpose(r.board), moved: r.moved, gained: r.gained };
}

function moveDown(b){
  const r = moveRight(transpose(b));
  return { board: transpose(r.board), moved: r.moved, gained: r.gained };
}

function canMove(b){
  if (emptyCells(b).length > 0) return true;
  for (let r = 0; r < 4; r++) {
    for (let c = 0; c < 4; c++) {
      if (c < 3 && b[r][c] === b[r][c + 1]) return true;
      if (r < 3 && b[r][c] === b[r + 1][c]) return true;
    }
  }
  return false;
}

function render(){
  boardEl.innerHTML = '';
  for (let r = 0; r < 4; r++) {
    for (let c = 0; c < 4; c++) {
      const v = board[r][c];
      const tile = document.createElement('div');
      tile.className = 'tile2048';
      if (v) {
        tile.textContent = v;
        tile.style.background = TILE_COLORS[v] || '#fff4c2';
        tile.style.color = v >= 256 ? '#0a0d14' : '#eef1f6';
        tile.style.fontSize = String(v).length >= 4 ? '18px' : String(v).length === 3 ? '22px' : '26px';
      }
      boardEl.appendChild(tile);
    }
  }
  scoreEl.textContent = score;
}

function handleMove(direction){
  if (gameOver) return;
  const fn = { left: moveLeft, right: moveRight, up: moveUp, down: moveDown }[direction];
  const result = fn(board);
  if (!result.moved) return;

  board = result.board;
  score += result.gained;
  spawnTile(board);
  render();

  const best = Math.max(score, getBest());
  setBest(best);
  bestEl.textContent = best;

  if (!hasWon && board.some((row) => row.includes(2048))) {
    hasWon = true;
    winOverlay.classList.add('is-visible');
    return;
  }

  if (!canMove(board)) {
    gameOver = true;
    overDetail.textContent = 'Score: ' + score;
    overOverlay.classList.add('is-visible');
  }
}

document.addEventListener('keydown', (e) => {
  const k = e.key.toLowerCase();
  const map = { arrowleft: 'left', a: 'left', arrowright: 'right', d: 'right', arrowup: 'up', w: 'up', arrowdown: 'down', s: 'down' };
  if (map[k]) { e.preventDefault(); handleMove(map[k]); }
});

let touchX, touchY;
boardEl.addEventListener('touchstart', (e) => {
  touchX = e.touches[0].clientX;
  touchY = e.touches[0].clientY;
}, { passive: true });

boardEl.addEventListener('touchend', (e) => {
  const dx = e.changedTouches[0].clientX - touchX;
  const dy = e.changedTouches[0].clientY - touchY;
  if (Math.max(Math.abs(dx), Math.abs(dy)) < 24) return;
  if (Math.abs(dx) > Math.abs(dy)) handleMove(dx > 0 ? 'right' : 'left');
  else handleMove(dy > 0 ? 'down' : 'up');
}, { passive: true });

function newGame(){
  board = emptyBoard();
  score = 0;
  hasWon = false;
  gameOver = false;
  spawnTile(board);
  spawnTile(board);
  winOverlay.classList.remove('is-visible');
  overOverlay.classList.remove('is-visible');
  render();
}

document.getElementById('keepGoing').addEventListener('click', () => winOverlay.classList.remove('is-visible'));
document.getElementById('newGameFromWin').addEventListener('click', newGame);
document.getElementById('restart').addEventListener('click', newGame);
document.getElementById('restartTop').addEventListener('click', newGame);

newGame();
</script>

</body>
</html>
