<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240">
  <defs>
    <pattern id="dots" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="#ffffff" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="400" height="240" fill="#0a0d14"/>
  <rect width="400" height="240" fill="url(#dots)"/>

  <!-- 4x4 tile grid -->
  <g font-family="monospace" font-weight="700" text-anchor="middle">
    <!-- row 1 -->
    <rect x="92" y="32" width="50" height="50" rx="8" fill="#161c28"/>
    <rect x="148" y="32" width="50" height="50" rx="8" fill="#1f2840" />
    <text x="173" y="64" font-size="20" fill="#8d96a8">2</text>
    <rect x="204" y="32" width="50" height="50" rx="8" fill="#23365c"/>
    <text x="229" y="64" font-size="20" fill="#a9c6ff">4</text>
    <rect x="260" y="32" width="50" height="50" rx="8" fill="#161c28"/>

    <!-- row 2 -->
    <rect x="92" y="88" width="50" height="50" rx="8" fill="#1f3b3a"/>
    <text x="117" y="120" font-size="20" fill="#3ee08a">8</text>
    <rect x="148" y="88" width="50" height="50" rx="8" fill="#161c28"/>
    <rect x="204" y="88" width="50" height="50" rx="8" fill="#3a3320"/>
    <text x="229" y="120" font-size="18" fill="#ffce45">16</text>
    <rect x="260" y="88" width="50" height="50" rx="8" fill="#161c28"/>

    <!-- row 3 -->
    <rect x="92" y="144" width="50" height="50" rx="8" fill="#161c28"/>
    <rect x="148" y="144" width="50" height="50" rx="8" fill="#3a2030"/>
    <text x="173" y="176" font-size="18" fill="#ff3d7f">64</text>
    <rect x="204" y="144" width="50" height="50" rx="8" fill="#161c28"/>
    <rect x="260" y="144" width="50" height="50" rx="8"
      fill="#ff3d7f"/>
    <text x="285" y="176" font-size="14" fill="#0a0d14">2048</text>

    <!-- row 4 -->
    <rect x="92" y="200" width="50" height="32" rx="8" fill="#161c28"/>
    <rect x="148" y="200" width="50" height="32" rx="8" fill="#161c28"/>
    <rect x="204" y="200" width="50" height="32" rx="8" fill="#161c28"/>
    <rect x="260" y="200" width="50" height="32" rx="8" fill="#161c28"/>
  </g>
</svg>
