<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>%F0%9F%95%B9%EF%B8%8F</text></svg>">
<title>Sky Dodger — Web Arcade</title>
<link rel="stylesheet" href="../../style.css">
</head>
<body>

<div class="game-topbar">
  <a class="game-topbar__back" href="../../index.html">&larr; Arcade</a>
  <span class="game-topbar__brand">WEB ARCADE</span>
</div>

<main class="game-shell">
  <h2>Sky Dodger</h2>
  <p class="game-shell__hint">Tap, click, or press space to climb. Thread the gaps without clipping a wall.</p>

  <div class="scoreboard">
    <div class="scoreboard__item">Score<b id="score">0</b></div>
    <div class="scoreboard__item">Best<b id="best">0</b></div>
  </div>

  <div class="game-stage">
    <canvas id="game" width="360" height="520"></canvas>
    <div class="game-overlay" id="overlay">
      <div class="game-overlay__title" id="overlayTitle">Game over</div>
      <div class="game-overlay__detail" id="overlayDetail">Score: 0</div>
      <button class="btn btn--solid" id="restart">Play again</button>
    </div>
  </div>

  <div class="game-controls">
    <button class="btn" id="restartTop">New game</button>
  </div>
</main>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

const scoreEl = document.getElementById('score');
const bestEl = document.getElementById('best');
const overlay = document.getElementById('overlay');
const overlayTitle = document.getElementById('overlayTitle');
const overlayDetail = document.getElementById('overlayDetail');

const BEST_KEY = 'arcade.dodger.best';
function getBest(){ try { return parseInt(localStorage.getItem(BEST_KEY) || '0', 10); } catch(e){ return 0; } }
function setBest(v){ try { localStorage.setItem(BEST_KEY, String(v)); } catch(e){} }
bestEl.textContent = getBest();

const BIRD_R = 12;
const GRAVITY = 0.45;
const FLAP = -7.5;
const GAP = 150;
const WALL_W = 56;
const WALL_SPEED = 2.6;
const SPAWN_EVERY = 95; // frames between new walls

let bird, walls, score, frame, running, started;

function newGame(){
  bird = { x: W * 0.3, y: H / 2, vy: 0 };
  walls = [];
  score = 0;
  frame = 0;
  running = true;
  started = false;
  scoreEl.textContent = score;
  overlay.classList.remove('is-visible');
}

function spawnWall(){
  const margin = 50;
  const gapTop = margin + Math.random() * (H - margin * 2 - GAP);
  walls.push({ x: W, gapTop, scored: false });
}

function flap(){
  if (!running) return;
  if (!started) started = true;
  bird.vy = FLAP;
}

document.addEventListener('keydown', (e) => {
  if (e.key === ' ') { e.preventDefault(); flap(); }
});
canvas.addEventListener('mousedown', flap);
canvas.addEventListener('touchstart', (e) => { e.preventDefault(); flap(); }, { passive: false });

function endGame(){
  running = false;
  const best = Math.max(score, getBest());
  setBest(best);
  bestEl.textContent = best;
  overlayTitle.textContent = 'Game over';
  overlayDetail.textContent = 'Score: ' + score;
  overlay.classList.add('is-visible');
}

function update(){
  if (!started) return;

  frame++;
  bird.vy += GRAVITY;
  bird.y += bird.vy;

  if (frame % SPAWN_EVERY === 0) spawnWall();

  walls.forEach((w) => { w.x -= WALL_SPEED; });
  while (walls.length && walls[0].x < -WALL_W) walls.shift();

  if (bird.y - BIRD_R <= 0 || bird.y + BIRD_R >= H) { endGame(); return; }

  for (const w of walls) {
    const hitsX = bird.x + BIRD_R > w.x && bird.x - BIRD_R < w.x + WALL_W;
    if (hitsX) {
      const hitsGap = bird.y - BIRD_R > w.gapTop && bird.y + BIRD_R < w.gapTop + GAP;
      if (!hitsGap) { endGame(); return; }
    }
    if (!w.scored && w.x + WALL_W < bird.x) {
      w.scored = true;
      score++;
      scoreEl.textContent = score;
    }
  }
}

function draw(){
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#11161f');
  grad.addColorStop(1, '#060809');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  walls.forEach((w) => {
    ctx.fillStyle = '#3ee08a';
    ctx.shadowColor = '#3ee08a';
    ctx.shadowBlur = 5;
    ctx.fillRect(w.x, 0, WALL_W, w.gapTop);
    ctx.fillRect(w.x, w.gapTop + GAP, WALL_W, H - (w.gapTop + GAP));
    ctx.shadowBlur = 0;
  });

  ctx.save();
  ctx.translate(bird.x, bird.y);
  ctx.rotate(Math.max(-0.5, Math.min(0.9, bird.vy / 10)));
  ctx.fillStyle = '#ffce45';
  ctx.shadowColor = '#ffce45';
  ctx.shadowBlur = 8;
  ctx.beginPath();
  ctx.arc(0, 0, BIRD_R, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#060809';
  ctx.beginPath();
  ctx.moveTo(BIRD_R - 2, -3);
  ctx.lineTo(BIRD_R + 8, 0);
  ctx.lineTo(BIRD_R - 2, 3);
  ctx.closePath();
  ctx.fill();
  ctx.restore();

  if (!started) {
    ctx.fillStyle = 'rgba(238,241,246,0.6)';
    ctx.font = '13px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('Tap, click, or press space to start', W / 2, H / 2 - 40);
  }
}

function loop(){
  if (running) update();
  draw();
  requestAnimationFrame(loop);
}

document.getElementById('restart').addEventListener('click', newGame);
document.getElementById('restartTop').addEventListener('click', newGame);

newGame();
loop();
</script>

</body>
</html>
