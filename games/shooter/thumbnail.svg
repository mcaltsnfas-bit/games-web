<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240">
  <defs>
    <pattern id="dots" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="#ffffff" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="400" height="240" fill="#060809"/>
  <rect width="400" height="240" fill="url(#dots)"/>

  <!-- starfield -->
  <g fill="#ffffff" opacity="0.4">
    <circle cx="30" cy="20" r="1.5"/>
    <circle cx="80" cy="60" r="1.5"/>
    <circle cx="140" cy="15" r="1.5"/>
    <circle cx="220" cy="40" r="1.5"/>
    <circle cx="300" cy="20" r="1.5"/>
    <circle cx="360" cy="55" r="1.5"/>
    <circle cx="60" cy="120" r="1.5"/>
    <circle cx="340" cy="130" r="1.5"/>
  </g>

  <!-- enemy rows -->
  <g>
    <rect x="60" y="30" width="26" height="16" rx="3" fill="#ff3d7f"/>
    <rect x="100" y="30" width="26" height="16" rx="3" fill="#ff3d7f"/>
    <rect x="140" y="30" width="26" height="16" rx="3" fill="#ff3d7f"/>
    <rect x="180" y="30" width="26" height="16" rx="3" fill="#ff3d7f"/>
    <rect x="220" y="30" width="26" height="16" rx="3" fill="#ff3d7f"/>
    <rect x="260" y="30" width="26" height="16" rx="3" fill="#ff3d7f"/>

    <rect x="80" y="56" width="26" height="16" rx="3" fill="#c34fae"/>
    <rect x="120" y="56" width="26" height="16" rx="3" fill="#c34fae"/>
    <rect x="160" y="56" width="26" height="16" rx="3" fill="#c34fae"/>
    <rect x="200" y="56" width="26" height="16" rx="3" fill="#c34fae"/>
    <rect x="240" y="56" width="26" height="16" rx="3" fill="#c34fae"/>

    <rect x="100" y="82" width="26" height="16" rx="3" fill="#2dd4f0"/>
    <rect x="140" y="82" width="26" height="16" rx="3" fill="#2dd4f0"/>
    <rect x="180" y="82" width="26" height="16" rx="3" fill="#2dd4f0"/>
    <rect x="220" y="82" width="26" height="16" rx="3" fill="#2dd4f0"/>
  </g>

  <!-- bullet -->
  <rect x="197" y="140" width="6" height="30" rx="2" fill="#ffce45"/>

  <!-- player ship -->
  <path d="M200 178 L182 206 L218 206 Z" fill="#2dd4f0"/>
  <ellipse cx="200" cy="200" rx="26" ry="8" fill="#2dd4f0" opacity="0.18"/>
</svg>
