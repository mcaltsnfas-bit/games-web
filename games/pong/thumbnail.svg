<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240">
  <defs>
    <pattern id="dots" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="#ffffff" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="400" height="240" fill="#060809"/>
  <rect width="400" height="240" fill="url(#dots)"/>

  <!-- center dashed line -->
  <g stroke="#2a3142" stroke-width="4">
    <line x1="200" y1="10" x2="200" y2="30"/>
    <line x1="200" y1="46" x2="200" y2="66"/>
    <line x1="200" y1="82" x2="200" y2="102"/>
    <line x1="200" y1="118" x2="200" y2="138"/>
    <line x1="200" y1="154" x2="200" y2="174"/>
    <line x1="200" y1="190" x2="200" y2="210"/>
    <line x1="200" y1="226" x2="200" y2="230"/>
  </g>

  <!-- paddles -->
  <rect x="36" y="90" width="12" height="60" rx="4" fill="#2dd4f0"/>
  <rect x="352" y="100" width="12" height="60" rx="4" fill="#ff3d7f"/>

  <!-- ball -->
  <circle cx="225" cy="120" r="8" fill="#ffce45"/>
  <circle cx="225" cy="120" r="16" fill="#ffce45" opacity="0.2"/>
</svg>
