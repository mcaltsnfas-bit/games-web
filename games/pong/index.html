<!DOCTYPE html>
<html>
<head>
<title>Pong</title>
<style>
body {
  margin:0;
  font-family:Arial;
  display:flex;
  flex-direction:column;
  align-items:center;
  background:#f5f5f5;
}

canvas {
  border:2px solid #ddd;
  margin-top:20px;
  background:white;
}

button {
  margin-top:10px;
  padding:10px;
}
</style>
</head>
<body>

<h2>Pong</h2>

<canvas id="c" width="500" height="300"></canvas>
<button onclick="reset()">Restart</button>

<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");

// GAME STATE
let ball, paddle;

// INIT
function reset(){
  ball = {
    x: 250,
    y: 150,
    vx: 3,
    vy: 2
  };

  paddle = {
    y: 120
  };
}

// FIX 1: correct mouse tracking (this is where most versions break)
c.addEventListener("mousemove", (e) => {
  const rect = c.getBoundingClientRect();
  const mouseY = e.clientY - rect.top;

  paddle.y = mouseY - 40;

  // clamp so paddle never goes off screen
  if(paddle.y < 0) paddle.y = 0;
  if(paddle.y > 220) paddle.y = 220;
});

// UPDATE LOGIC
function update(){
  ball.x += ball.vx;
  ball.y += ball.vy;

  // top/bottom bounce
  if(ball.y <= 0 || ball.y >= 290){
    ball.vy *= -1;
  }

  // FIX 2: proper paddle collision (simple & forgiving)
  const paddleX = 20;
  const paddleW = 10;
  const paddleH = 80;

  if(
    ball.x <= paddleX + paddleW &&
    ball.y >= paddle.y &&
    ball.y <= paddle.y + paddleH
  ){
    ball.vx *= -1;

    // push ball outside paddle so it doesn't re-trigger instantly
    ball.x = paddleX + paddleW + 1;

    // tiny speed increase (Google feel)
    ball.vx *= 1.02;
  }

  // reset if missed
  if(ball.x < -20 || ball.x > 520){
    reset();
  }
}

// DRAW
function draw(){
  ctx.clearRect(0,0,500,300);

  // ball
  ctx.fillStyle="black";
  ctx.fillRect(ball.x, ball.y, 10, 10);

  // paddle
  ctx.fillRect(20, paddle.y, 10, 80);
}

// LOOP
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

reset();
loop();
</script>

</body>
</html>
