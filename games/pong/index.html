<!DOCTYPE html>
<html>
<head>
<title>Google-Style Pong</title>
<style>
body {
  margin:0;
  background:#f5f5f5;
  font-family:Arial;
  display:flex;
  flex-direction:column;
  align-items:center;
}

h2 { margin-top:20px; }

canvas {
  background:white;
  border:2px solid #ddd;
  margin-top:20px;
}

button {
  margin-top:10px;
  padding:10px 15px;
  border:none;
  background:#333;
  color:white;
  border-radius:6px;
  cursor:pointer;
}
</style>
</head>
<body>

<h2>Pong</h2>
<canvas id="game" width="500" height="300"></canvas>
<button onclick="reset()">Restart</button>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let ball, paddle;

function reset(){
  ball = {
    x:250,
    y:150,
    vx:3,
    vy:2
  };

  paddle = {
    y:120
  };
}

// FIX: correct mouse tracking (THIS is usually the bug)
canvas.addEventListener("mousemove", function(e){
  const rect = canvas.getBoundingClientRect();
  paddle.y = e.clientY - rect.top - 40;
});

// GAME LOOP
function update(){

  // move ball
  ball.x += ball.vx;
  ball.y += ball.vy;

  // wall bounce
  if(ball.y <= 0 || ball.y >= 300){
    ball.vy *= -1;
  }

  // paddle collision (correct hitbox)
  if(
    ball.x <= 30 &&
    ball.y >= paddle.y &&
    ball.y <= paddle.y + 80
  ){
    ball.vx *= -1;

    // prevent sticking
    ball.x = 30;

    // slight speed increase
    ball.vx *= 1.02;
  }

  // reset if missed
  if(ball.x < 0 || ball.x > 500){
    reset();
  }
}

// DRAW
function draw(){
  ctx.clearRect(0,0,500,300);

  // ball
  ctx.fillStyle="black";
  ctx.fillRect(ball.x, ball.y, 10, 10);

  // paddle
  ctx.fillRect(20, paddle.y, 10, 80);
}

// LOOP (stable 60fps)
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

reset();
loop();
</script>

</body>
</html>
