<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>%F0%9F%95%B9%EF%B8%8F</text></svg>">
<title>Pong — Web Arcade</title>
<link rel="stylesheet" href="../../style.css">
</head>
<body>

<div class="game-topbar">
  <a class="game-topbar__back" href="../../index.html">&larr; Arcade</a>
  <span class="game-topbar__brand">WEB ARCADE</span>
</div>

<main class="game-shell">
  <h2>Pong</h2>
  <p class="game-shell__hint">Move your mouse (or finger) to steer the left paddle. First to 5 wins.</p>

  <div class="scoreboard">
    <div class="scoreboard__item">You<b id="playerScore">0</b></div>
    <div class="scoreboard__item">CPU<b id="aiScore">0</b></div>
    <div class="scoreboard__item">Wins<b id="wins">0</b></div>
  </div>

  <div class="game-stage">
    <canvas id="game" width="500" height="300"></canvas>
    <div class="game-overlay" id="overlay">
      <div class="game-overlay__title" id="overlayTitle">You win!</div>
      <div class="game-overlay__detail" id="overlayDetail">Final score 5 - 2</div>
      <button class="btn btn--solid" id="restart">Play again</button>
    </div>
  </div>

  <div class="game-controls">
    <button class="btn" id="restartTop">Restart match</button>
  </div>
</main>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const PADDLE_W = 10, PADDLE_H = 80, BALL = 10;
const PLAYER_X = 16, AI_X = W - 16 - PADDLE_W;
const WIN_SCORE = 5;

const playerScoreEl = document.getElementById('playerScore');
const aiScoreEl = document.getElementById('aiScore');
const winsEl = document.getElementById('wins');
const overlay = document.getElementById('overlay');
const overlayTitle = document.getElementById('overlayTitle');
const overlayDetail = document.getElementById('overlayDetail');

const WINS_KEY = 'arcade.pong.wins';
function getWins(){ try { return parseInt(localStorage.getItem(WINS_KEY) || '0', 10); } catch(e){ return 0; } }
function addWin(){ try { localStorage.setItem(WINS_KEY, String(getWins() + 1)); } catch(e){} }
winsEl.textContent = getWins();

let ball, playerY, aiY, playerScore, aiScore, running;

function serve(direction){
  ball = {
    x: W / 2,
    y: H / 2,
    vx: 4 * direction,
    vy: (Math.random() * 4) - 2
  };
  if (Math.abs(ball.vy) < 1) ball.vy = 1.5;
}

function updateScores(){
  playerScoreEl.textContent = playerScore;
  aiScoreEl.textContent = aiScore;
}

function reset(){
  playerY = H / 2 - PADDLE_H / 2;
  aiY = H / 2 - PADDLE_H / 2;
  playerScore = 0;
  aiScore = 0;
  running = true;
  updateScores();
  overlay.classList.remove('is-visible');
  serve(Math.random() < 0.5 ? 1 : -1);
}

function clampPlayer(){
  if (playerY < 0) playerY = 0;
  if (playerY > H - PADDLE_H) playerY = H - PADDLE_H;
}

function trackPointer(clientY){
  const rect = canvas.getBoundingClientRect();
  const scale = canvas.height / rect.height;
  playerY = (clientY - rect.top) * scale - PADDLE_H / 2;
  clampPlayer();
}

canvas.addEventListener('mousemove', (e) => trackPointer(e.clientY));
canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  trackPointer(e.touches[0].clientY);
}, { passive: false });

function endGame(playerWon){
  running = false;
  if (playerWon) {
    addWin();
    winsEl.textContent = getWins();
    overlayTitle.textContent = 'You win!';
  } else {
    overlayTitle.textContent = 'CPU wins';
  }
  overlayDetail.textContent = `Final score ${playerScore} - ${aiScore}`;
  overlay.classList.add('is-visible');
}

function update(){
  // AI tracks the ball with a capped speed, so it's beatable
  const aiCenter = aiY + PADDLE_H / 2;
  const aiSpeed = 3.3;
  if (aiCenter < ball.y - 6) aiY += aiSpeed;
  else if (aiCenter > ball.y + 6) aiY -= aiSpeed;
  if (aiY < 0) aiY = 0;
  if (aiY > H - PADDLE_H) aiY = H - PADDLE_H;

  ball.x += ball.vx;
  ball.y += ball.vy;

  if (ball.y <= 0) { ball.y = 0; ball.vy *= -1; }
  if (ball.y >= H - BALL) { ball.y = H - BALL; ball.vy *= -1; }

  // player paddle collision
  if (ball.vx < 0 && ball.x <= PLAYER_X + PADDLE_W && ball.x >= PLAYER_X &&
      ball.y + BALL >= playerY && ball.y <= playerY + PADDLE_H) {
    const hit = ((ball.y + BALL / 2) - (playerY + PADDLE_H / 2)) / (PADDLE_H / 2);
    ball.vy = hit * 4.5;
    ball.vx = Math.min(Math.abs(ball.vx) * 1.05, 9);
    ball.x = PLAYER_X + PADDLE_W + 1;
  }

  // AI paddle collision
  if (ball.vx > 0 && ball.x + BALL >= AI_X && ball.x <= AI_X + PADDLE_W &&
      ball.y + BALL >= aiY && ball.y <= aiY + PADDLE_H) {
    const hit = ((ball.y + BALL / 2) - (aiY + PADDLE_H / 2)) / (PADDLE_H / 2);
    ball.vy = hit * 4.5;
    ball.vx = -Math.min(Math.abs(ball.vx) * 1.05, 9);
    ball.x = AI_X - BALL - 1;
  }

  if (ball.x < -20) {
    aiScore++;
    updateScores();
    if (aiScore >= WIN_SCORE) { endGame(false); return; }
    serve(1);
  } else if (ball.x > W + 20) {
    playerScore++;
    updateScores();
    if (playerScore >= WIN_SCORE) { endGame(true); return; }
    serve(-1);
  }
}

function draw(){
  ctx.fillStyle = '#060809';
  ctx.fillRect(0, 0, W, H);

  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.setLineDash([6, 10]);
  ctx.beginPath();
  ctx.moveTo(W / 2, 0);
  ctx.lineTo(W / 2, H);
  ctx.stroke();
  ctx.setLineDash([]);

  ctx.fillStyle = '#2dd4f0';
  ctx.shadowColor = '#2dd4f0';
  ctx.shadowBlur = 6;
  ctx.fillRect(PLAYER_X, playerY, PADDLE_W, PADDLE_H);

  ctx.fillStyle = '#ff3d7f';
  ctx.shadowColor = '#ff3d7f';
  ctx.fillRect(AI_X, aiY, PADDLE_W, PADDLE_H);

  ctx.fillStyle = '#ffce45';
  ctx.shadowColor = '#ffce45';
  ctx.fillRect(ball.x, ball.y, BALL, BALL);
  ctx.shadowBlur = 0;
}

function loop(){
  if (running) update();
  draw();
  requestAnimationFrame(loop);
}

document.getElementById('restart').addEventListener('click', reset);
document.getElementById('restartTop').addEventListener('click', reset);

reset();
loop();
</script>

</body>
</html>
