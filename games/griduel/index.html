<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grid Duel — Web Arcade</title>
<link rel="stylesheet" href="../../style.css">
<style>
  .page { min-height: calc(100vh - 54px); display:flex; align-items:center; justify-content:center; padding:20px; }
  .card { background:var(--bg-panel); border:1px solid var(--border-strong); border-radius:var(--radius); padding:32px 26px; max-width:380px; width:100%; text-align:center; }
  .card h1 { font-family:var(--font-display); font-size:15px; color:var(--cyan); text-shadow:0 0 12px rgba(45,212,240,0.5); margin:0 0 8px; }
  .card p  { font-size:13px; color:var(--ink-dim); margin:0 0 22px; line-height:1.6; }
  .code-box { font-family:var(--font-display); font-size:30px; color:var(--green); background:var(--bg-recess); border:1px solid var(--border-strong); border-radius:var(--radius-sm); padding:14px; margin:12px 0; letter-spacing:0.15em; }
  .divider { font-size:11px; color:var(--ink-faint); text-transform:uppercase; letter-spacing:0.08em; margin:22px 0; }
  input[type=text] {
    display:block; width:100%; box-sizing:border-box;
    padding:14px 12px; font-size:18px; font-family:var(--font-mono);
    letter-spacing:0.14em; text-align:center; text-transform:uppercase;
    background:var(--bg-recess); color:var(--ink);
    border:2px solid var(--border-strong); border-radius:var(--radius-sm);
    margin-bottom:10px;
  }
  input[type=text]:focus { outline:none; border-color:var(--cyan); }
  .btn { width:100%; margin-bottom:8px; }
  .hint { font-size:11px; color:var(--ink-faint); margin:6px 0 0; line-height:1.6; }
  .err  { color:var(--magenta); font-size:12px; min-height:18px; margin:8px 0 0; }
</style>
</head>
<body>

<div class="game-topbar">
  <a class="game-topbar__back" href="../../index.html">&larr; Arcade</a>
  <span class="game-topbar__brand">WEB ARCADE</span>
</div>

<div class="page">
  <div class="card">
    <h1>GRID DUEL</h1>
    <p>1v1 build-and-shoot. Create a room, send your friend the code, then both enter the game.</p>

    <div id="createSection">
      <button class="btn btn--solid" id="createBtn">Create Room</button>
    </div>

    <div id="codeSection" style="display:none">
      <div class="code-box" id="codeDisplay"></div>
      <button class="btn" id="copyBtn">Copy invite link</button>
      <p class="hint">Send that link (or just the code) to your friend.<br>Once they've joined, you'll drop into the match automatically.</p>
      <button class="btn btn--solid" id="enterHostBtn" style="margin-top:12px">Enter Game &rarr;</button>
    </div>

    <div class="divider">— or join a friend's room —</div>

    <input type="text" id="codeInput" placeholder="ENTER CODE" maxlength="5"
           autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false">
    <button class="btn" id="joinBtn">Join Room</button>
    <p class="err" id="errMsg"></p>
  </div>
</div>

<script>
/* Zero-dependency lobby: no Firebase, no canvas, no Three.js.
   Generates a code and redirects to game.html with URL params. */
let myCode = '';

function randCode(){
  const c = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  return Array.from({length:5}, () => c[Math.floor(Math.random()*c.length)]).join('');
}

function gameURL(code, role){
  const base = location.href.substring(0, location.href.lastIndexOf('/') + 1);
  return base + 'game.html?code=' + encodeURIComponent(code) + '&role=' + role;
}

document.getElementById('createBtn').addEventListener('click', () => {
  myCode = randCode();
  document.getElementById('codeDisplay').textContent = myCode;
  document.getElementById('createSection').style.display = 'none';
  document.getElementById('codeSection').style.display = 'block';
});

document.getElementById('copyBtn').addEventListener('click', () => {
  const url = gameURL(myCode, 'guest');
  const btn = document.getElementById('copyBtn');
  navigator.clipboard.writeText(url)
    .then(() => { btn.textContent = 'Copied!'; setTimeout(() => btn.textContent = 'Copy invite link', 2000); })
    .catch(() => { prompt('Copy this link and send it to your friend:', url); });
});

document.getElementById('enterHostBtn').addEventListener('click', () => {
  window.location.href = gameURL(myCode, 'host');
});

function doJoin(){
  const code = document.getElementById('codeInput').value.trim().toUpperCase();
  const err = document.getElementById('errMsg');
  err.textContent = '';
  if (code.length < 3){ err.textContent = 'Please enter the room code first.'; return; }
  window.location.href = gameURL(code, 'guest');
}

document.getElementById('joinBtn').addEventListener('click', doJoin);
document.getElementById('codeInput').addEventListener('keydown', e => { if (e.key === 'Enter') doJoin(); });
</script>

</body>
</html>
