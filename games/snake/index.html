<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>%F0%9F%95%B9%EF%B8%8F</text></svg>">
<title>Snake — Web Arcade</title>
<link rel="stylesheet" href="../../style.css">
</head>
<body>

<div class="game-topbar">
  <a class="game-topbar__back" href="../../index.html">&larr; Arcade</a>
  <span class="game-topbar__brand">WEB ARCADE</span>
</div>

<main class="game-shell">
  <h2>Snake</h2>
  <p class="game-shell__hint">Arrow keys or WASD to move. Eat the dot, don't bite your own tail. Space to pause.</p>

  <div class="scoreboard">
    <div class="scoreboard__item">Score<b id="score">0</b></div>
    <div class="scoreboard__item">Best<b id="best">0</b></div>
  </div>

  <div class="game-stage">
    <canvas id="game" width="400" height="400"></canvas>
    <div class="game-overlay" id="overlay">
      <div class="game-overlay__title" id="overlayTitle">Game Over</div>
      <div class="game-overlay__detail" id="overlayDetail">Score: 0</div>
      <button class="btn btn--solid" id="restart">Play again</button>
    </div>
  </div>

  <div class="game-controls">
    <button class="btn" id="pauseBtn">Pause</button>
  </div>
</main>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const CELL = 20;
const COLS = canvas.width / CELL;
const ROWS = canvas.height / CELL;

const scoreEl = document.getElementById('score');
const bestEl = document.getElementById('best');
const overlay = document.getElementById('overlay');
const overlayTitle = document.getElementById('overlayTitle');
const overlayDetail = document.getElementById('overlayDetail');
const pauseBtn = document.getElementById('pauseBtn');
const restartBtn = document.getElementById('restart');

const BEST_KEY = 'arcade.snake.best';
function getBest(){ try { return parseInt(localStorage.getItem(BEST_KEY) || '0', 10); } catch(e){ return 0; } }
function setBest(v){ try { localStorage.setItem(BEST_KEY, String(v)); } catch(e){} }
bestEl.textContent = getBest();

let snake, dir, nextDir, food, score, speed, running, paused, loopTimer;

function spawnFood(){
  let pos;
  do {
    pos = { x: Math.floor(Math.random()*COLS)*CELL, y: Math.floor(Math.random()*ROWS)*CELL };
  } while (snake.some(s => s.x===pos.x && s.y===pos.y));
  return pos;
}

function reset(){
  snake = [{x:200,y:200},{x:180,y:200},{x:160,y:200}];
  dir = {x:20,y:0};
  nextDir = dir;
  score = 0;
  speed = 110;
  running = true;
  paused = false;
  food = spawnFood();
  scoreEl.textContent = score;
  overlay.classList.remove('is-visible');
  pauseBtn.textContent = 'Pause';
  pauseBtn.disabled = false;
  clearTimeout(loopTimer);
  loop();
}

function setDir(x, y){
  if (snake.length > 1 && x === -dir.x && y === -dir.y) return; // no instant reverse
  nextDir = {x, y};
}

document.addEventListener('keydown', (e) => {
  const k = e.key.toLowerCase();
  if (k === 'arrowup' || k === 'w') setDir(0, -CELL);
  else if (k === 'arrowdown' || k === 's') setDir(0, CELL);
  else if (k === 'arrowleft' || k === 'a') setDir(-CELL, 0);
  else if (k === 'arrowright' || k === 'd') setDir(CELL, 0);
  else if (k === ' ') { e.preventDefault(); togglePause(); }
});

function togglePause(){
  if (!running) return;
  paused = !paused;
  pauseBtn.textContent = paused ? 'Resume' : 'Pause';
  if (!paused) loop();
}
pauseBtn.addEventListener('click', togglePause);
restartBtn.addEventListener('click', reset);

function endGame(){
  running = false;
  clearTimeout(loopTimer);
  const best = Math.max(score, getBest());
  setBest(best);
  bestEl.textContent = best;
  overlayTitle.textContent = 'Game over';
  overlayDetail.textContent = 'Score: ' + score;
  overlay.classList.add('is-visible');
}

function update(){
  dir = nextDir;
  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

  if (head.x < 0 || head.y < 0 || head.x >= canvas.width || head.y >= canvas.height) {
    endGame(); return;
  }

  // if we're not eating this turn, the tail cell is about to be vacated,
  // so moving into it is legal — only check collision against the body
  // that will still be occupied after this move.
  const willEat = head.x === food.x && head.y === food.y;
  const bodyToCheck = willEat ? snake : snake.slice(0, -1);
  if (bodyToCheck.some(s => s.x === head.x && s.y === head.y)) {
    endGame(); return;
  }

  snake.unshift(head);

  if (willEat) {
    score++;
    scoreEl.textContent = score;
    food = spawnFood();
    speed = Math.max(60, 110 - score * 2);
  } else {
    snake.pop();
  }
}

function draw(){
  ctx.fillStyle = '#060809';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.shadowColor = '#ff3d7f';
  ctx.shadowBlur = 8;
  ctx.fillStyle = '#ff3d7f';
  ctx.fillRect(food.x + 2, food.y + 2, CELL - 4, CELL - 4);
  ctx.shadowBlur = 0;

  snake.forEach((s, i) => {
    ctx.fillStyle = i === 0 ? '#2dd4f0' : '#1c8fa6';
    ctx.fillRect(s.x + 1, s.y + 1, CELL - 2, CELL - 2);
  });
}

function loop(){
  if (!running || paused) return;
  update();
  draw();
  if (running) loopTimer = setTimeout(loop, speed);
}

reset();
</script>

</body>
</html>
