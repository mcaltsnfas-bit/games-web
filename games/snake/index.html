<!DOCTYPE html>
<html>
<head>
<title>Snake</title>
<style>
body { margin:0; background:#111; color:white; font-family:Arial; display:flex; flex-direction:column; align-items:center; }
canvas { background:#000; margin-top:20px; }
button { margin-top:10px; padding:10px; }
</style>
</head>
<body>

<h2>Snake</h2>
<canvas id="game" width="400" height="400"></canvas>
<button onclick="resetGame()">Restart</button>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let snake, dir, food;

function resetGame(){
  snake = [{x:200,y:200}];
  dir = {x:20,y:0};
  food = spawn();
}

function spawn(){
  return {
    x: Math.floor(Math.random()*20)*20,
    y: Math.floor(Math.random()*20)*20
  };
}

document.addEventListener("keydown", e=>{
  if(e.key==="ArrowUp") dir={x:0,y:-20};
  if(e.key==="ArrowDown") dir={x:0,y:20};
  if(e.key==="ArrowLeft") dir={x:-20,y:0};
  if(e.key==="ArrowRight") dir={x:20,y:0};
});

function update(){
  const head = {x:snake[0].x+dir.x, y:snake[0].y+dir.y};

  // wall reset (clean Google-style behaviour)
  if(head.x<0||head.y<0||head.x>=400||head.y>=400){
    resetGame();
    return;
  }

  snake.unshift(head);

  if(head.x===food.x && head.y===food.y){
    food = spawn();
  } else {
    snake.pop();
  }
}

function draw(){
  ctx.fillStyle="#000";
  ctx.fillRect(0,0,400,400);

  ctx.fillStyle="red";
  ctx.fillRect(food.x,food.y,20,20);

  ctx.fillStyle="lime";
  snake.forEach(s=>ctx.fillRect(s.x,s.y,20,20));
}

function loop(){
  update();
  draw();
  setTimeout(()=>requestAnimationFrame(loop),100);
}

resetGame();
loop();
</script>

</body>
</html>
