<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240">
  <defs>
    <pattern id="dots" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="#ffffff" opacity="0.05"/>
    </pattern>
  </defs>
  <rect width="400" height="240" fill="#060809"/>
  <rect width="400" height="240" fill="url(#dots)"/>

  <!-- brick rows -->
  <g>
    <!-- row 1 cyan -->
    <rect x="40" y="30" width="42" height="16" rx="3" fill="#2dd4f0"/>
    <rect x="86" y="30" width="42" height="16" rx="3" fill="#2dd4f0"/>
    <rect x="132" y="30" width="42" height="16" rx="3" fill="#2dd4f0"/>
    <rect x="178" y="30" width="42" height="16" rx="3" fill="#2dd4f0"/>
    <rect x="224" y="30" width="42" height="16" rx="3" fill="#2dd4f0"/>
    <rect x="270" y="30" width="42" height="16" rx="3" fill="#2dd4f0"/>
    <rect x="316" y="30" width="42" height="16" rx="3" fill="#2dd4f0"/>
    <!-- row 2 green -->
    <rect x="40" y="50" width="42" height="16" rx="3" fill="#3ee08a"/>
    <rect x="86" y="50" width="42" height="16" rx="3" fill="#3ee08a"/>
    <rect x="132" y="50" width="42" height="16" rx="3" fill="#3ee08a"/>
    <rect x="178" y="50" width="42" height="16" rx="3" fill="#3ee08a"/>
    <rect x="224" y="50" width="42" height="16" rx="3" fill="#3ee08a"/>
    <rect x="270" y="50" width="42" height="16" rx="3" fill="#3ee08a"/>
    <rect x="316" y="50" width="42" height="16" rx="3" fill="#3ee08a"/>
    <!-- row 3 amber -->
    <rect x="40" y="70" width="42" height="16" rx="3" fill="#ffce45"/>
    <rect x="86" y="70" width="42" height="16" rx="3" fill="#ffce45"/>
    <rect x="178" y="70" width="42" height="16" rx="3" fill="#ffce45"/>
    <rect x="224" y="70" width="42" height="16" rx="3" fill="#ffce45"/>
    <rect x="270" y="70" width="42" height="16" rx="3" fill="#ffce45"/>
    <rect x="316" y="70" width="42" height="16" rx="3" fill="#ffce45"/>
    <!-- row 4 magenta, some destroyed -->
    <rect x="40" y="90" width="42" height="16" rx="3" fill="#ff3d7f"/>
    <rect x="132" y="90" width="42" height="16" rx="3" fill="#ff3d7f"/>
    <rect x="178" y="90" width="42" height="16" rx="3" fill="#ff3d7f"/>
    <rect x="270" y="90" width="42" height="16" rx="3" fill="#ff3d7f"/>
    <rect x="316" y="90" width="42" height="16" rx="3" fill="#ff3d7f"/>
  </g>

  <!-- ball -->
  <circle cx="150" cy="150" r="8" fill="#ffce45"/>
  <circle cx="150" cy="150" r="16" fill="#ffce45" opacity="0.2"/>

  <!-- paddle -->
  <rect x="165" y="200" width="90" height="14" rx="6" fill="#2dd4f0"/>
</svg>
