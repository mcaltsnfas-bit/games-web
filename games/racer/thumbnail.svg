<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240">
  <defs>
    <radialGradient id="glow" cx="50%" cy="60%" r="55%">
      <stop offset="0%" stop-color="#2dd4f0" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#2dd4f0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="road" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0a0d14"/>
    </linearGradient>
  </defs>
  <rect width="400" height="240" fill="#060809"/>
  <rect width="400" height="240" fill="url(#glow)"/>

  <!-- neon track oval -->
  <ellipse cx="200" cy="160" rx="160" ry="80" fill="none" stroke="#2dd4f0" stroke-width="22" opacity="0.13"/>
  <ellipse cx="200" cy="160" rx="160" ry="80" fill="none" stroke="#1c2636" stroke-width="18"/>
  <ellipse cx="200" cy="160" rx="160" ry="80" fill="none" stroke="#2dd4f0" stroke-width="1.5" opacity="0.6"/>
  <ellipse cx="200" cy="160" rx="136" ry="62" fill="none" stroke="#2dd4f0" stroke-width="1" opacity="0.25"/>

  <!-- boost pad glow (bottom straight) -->
  <rect x="130" y="218" width="50" height="8" rx="3" fill="#ffce45" opacity="0.7"/>
  <rect x="220" y="218" width="50" height="8" rx="3" fill="#ffce45" opacity="0.7"/>

  <!-- city buildings (left) -->
  <rect x="10"  y="60"  width="18" height="80" fill="#2dd4f0" opacity="0.12"/>
  <rect x="30"  y="40"  width="14" height="100" fill="#ff3d7f" opacity="0.12"/>
  <rect x="46"  y="70"  width="20" height="70" fill="#2dd4f0" opacity="0.1"/>
  <!-- city buildings (right) -->
  <rect x="344" y="50"  width="16" height="90" fill="#2dd4f0" opacity="0.12"/>
  <rect x="362" y="70"  width="18" height="70" fill="#ff3d7f" opacity="0.1"/>
  <rect x="328" y="65"  width="14" height="75" fill="#2dd4f0" opacity="0.1"/>

  <!-- car (behind-view, on top of track) -->
  <g transform="translate(200,148)">
    <!-- body -->
    <rect x="-18" y="-8" width="36" height="22" rx="4" fill="#2dd4f0"/>
    <!-- cabin -->
    <rect x="-10" y="-18" width="20" height="12" rx="3" fill="#2dd4f0" opacity="0.8"/>
    <!-- wheels -->
    <rect x="-22" y="6"  width="8"  height="10" rx="2" fill="#111"/>
    <rect x="14"  y="6"  width="8"  height="10" rx="2" fill="#111"/>
    <rect x="-22" y="-8" width="8"  height="10" rx="2" fill="#111"/>
    <rect x="14"  y="-8" width="8"  height="10" rx="2" fill="#111"/>
    <!-- headlights -->
    <rect x="-14" y="-10" width="10" height="4" rx="1" fill="white" opacity="0.9"/>
    <rect x="4"   y="-10" width="10" height="4" rx="1" fill="white" opacity="0.9"/>
  </g>
  <!-- car glow -->
  <ellipse cx="200" cy="162" rx="30" ry="14" fill="#2dd4f0" opacity="0.18"/>

  <!-- speed trail -->
  <line x1="183" y1="155" x2="160" y2="168" stroke="#2dd4f0" stroke-width="2" opacity="0.4"/>
  <line x1="217" y1="155" x2="240" y2="168" stroke="#2dd4f0" stroke-width="2" opacity="0.4"/>

  <!-- timer display -->
  <rect x="138" y="8" width="124" height="32" rx="6" fill="rgba(6,8,9,0.8)" stroke="#1c2636"/>
  <text x="200" y="30" font-family="monospace" font-size="16" font-weight="700" fill="#2dd4f0" text-anchor="middle">0:42.381</text>
</svg>
